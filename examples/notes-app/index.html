<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Notes App — OSX_UI</title>
  <link rel="stylesheet" href="/css/osx-ui.css"/>
  <style>
    body { margin: 0; }
    .osx-desktop { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
    .note-item { padding: 10px 14px; border-bottom: 1px solid rgba(148,163,184,.12); cursor: pointer; }
    .note-item:hover { background: rgba(255,255,255,.05); }
    .note-item .note-title { font-weight: 600; font-size: 14px; color: var(--osx-text); }
    .note-item .note-preview { font-size: 12px; color: var(--osx-muted); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .note-item .note-date { font-size: 11px; color: var(--osx-muted); margin-top: 2px; }
    .editor-area { width: 100%; min-height: 200px; resize: vertical; padding: 12px; border: 1px solid rgba(148,163,184,.25); border-radius: 10px; background: rgba(2,6,23,.4); color: var(--osx-text); font-family: inherit; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
